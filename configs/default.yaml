betas:
  - 9.0
  - 13.0
  - 14.0

seeds:
  - 1
  - 2

paths:
  raw_map_dir: "data/raw_maps"
  filament_graph_dir: "data/filament_graph_inputs"
  collective_density_dir: "data/collective_density_inputs"
  results_dir: "results"

preprocessing:
  filament:
    smooth_sigma: 1.0
    crit_percentile: 99.0
    force_rebuild: false

  collective_density:
    shape: [12, 12, 12, 12]
    top_k_hubs: 20
    max_pairs: 120
    save_images: true
    force_rebuild: false

schrodinger:
  alpha: 0.5
  beta_pot: 1.0
  dt: 0.5
  n_steps: 80

dispersion:
  best:
    "9.0":
      alpha: 2.0
      beta_pot: 1.0
    "13.0":
      alpha: 0.5
      beta_pot: 1.0
    "14.0":
      alpha: 2.0
      beta_pot: 0.25

einstein:
  sigma: 1.0
  alpha_metric: 1.0
  beta_metric: 0.5
  gamma_source: 0.5
  eta_source: 0.2